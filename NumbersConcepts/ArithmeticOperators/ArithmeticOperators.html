<!DOCTYPE html>
<html>

<head>
    <title>Adrithematic Opertors</title>
    <script src="ArithmeticOperators.js"></script>
    <link rel="stylesheet" href="ArithmeticOperators.css">
</head>

<body>
    <div class="container">
        <div class="box">
            <div class="form-row">
                <label for="txtFirstNumber">First Number</label>
                <input type="number" id="txtFirstNumber">
            </div>
            <div class="form-row">
                <label for="txtSecondNumber">Second Number</label>
                <input type="number" id="txtSecondNumber">
            </div>
        

        <div>
            <button id="btnAddition" onclick="addNumbers()">Addition</button>
            <button id="btnSubtraction" onclick="subNumbers()">Subtraction</button>
            <button id="btnMultiplication" onclick="mulNumbers()">Multiplication</button>
            <button id="btnDivision" onclick="divNumbers()">Division</button>
            <button id="btnReminder" onclick="remNumbers()">Remainder</button>
        </div>
        </div>
    </div>
</body>

</html>
