<!DOCTYPE html>
<html>
    <head>
        <title>Max , Min Value</title>
        <script src="MaxMinValues.JS" defer></script>
    </head>
    <body>
    <h1>Max Value / Min Value Function</h1>
    <label for="lblNumber">First Number</label>
    <input id="txtFirstNumber" type="number" placeholder="Enter a Value"><br>
    <label for="lblNumber">Second Number</label>
    <input id="txtSecondNumber" type="number" placeholder="Enter a Value"><br>
    <label for="lblNumber">Third Number</label>
    <input id="txtTirdNumber" type="number" placeholder="Enter a Value"><br>
    <label for="lblNumber">Fourth Number</label>
    <input id="txtFourthNumber" type="number" placeholder="Enter a Value"><br>
    <label for="lblNumber">Fifth Number</label>
    <input id="txtFifthNumber" type="number" placeholder="Enter a Value"><br>
    <label for="lblNumber">Sixth Number</label>
    <input id="txtSixthNumber" type="number" placeholder="Enter a Value"><br>
    <button id="btnMaxValue" onclick="onClickMaximumValue()">Max Value</button>
    <p id="pMaxVlue"></p>
    <button id="btnMinValue" onclick="onClickMinimumValue()">Min Value</button>
    <p id="pMinVlue"></p>
    </body>
</html>
