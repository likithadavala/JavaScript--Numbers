<!DOCTYPE html>
<html>
    <head>
        <title>Power</title>
        <script src="PowerFunction.js" defer></script>
    </head>
    <body>
        <h1>Power Function (Static)</h1>
         <label>Enter a value:</label>
        <input id="txtNumber" type="number" placeholder="Enter a value">
        <button id="btnPower" onclick="onClickPowerStatic()">Static Power</button>
        <p id="pPowerStatic"></p>
        <h1>Power Function (Dynamic)</h1>
        <label>Enter a value:</label>
        <input id="txtNumber" type="number" placeholder="Enter a value">
        <input id="txtDigits" type="number" placeholder="Enter a digit"><br>
        <button id="btnPower" onclick="onClickPowerDynamic()">Dynamic Power</button>
        <p id="pPowerDynamic"></p>

    </body>
</html>
